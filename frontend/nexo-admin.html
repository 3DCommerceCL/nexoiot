<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexo IoT — Panel General</title>
<link rel="stylesheet" href="./theme.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{display:flex;font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px}
.hidden{display:none!important}

/* ── SIDEBAR ── */
.sidebar{width:220px;min-width:220px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:50}
.sb-header{padding:20px 16px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-logo{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700;color:var(--text);white-space:nowrap;margin-bottom:6px}
.sb-logo-dot{width:8px;height:8px;border-radius:50%;background:var(--purple);flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.75)}}
.sb-hotel{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-nav{flex:1;padding:12px 0;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;color:var(--text2);border-left:3px solid transparent;transition:all .15s;white-space:nowrap;user-select:none}
.nav-item:hover{color:var(--text);background:rgba(16,24,40,.04)}
.nav-item.active{color:var(--purple);background:var(--purple-l);border-left-color:var(--purple)}
.nav-icon{font-size:16px;flex-shrink:0}
.nav-label{font-size:13px;font-weight:500}
.sb-footer{padding:16px;border-top:1px solid var(--border);flex-shrink:0}
.sb-status{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--purple);margin-bottom:5px;white-space:nowrap}
.sb-status-dot{width:7px;height:7px;border-radius:50%;background:var(--purple);flex-shrink:0;animation:pulse 2s infinite}
.sb-status-line{font-size:11px;color:var(--text3);white-space:nowrap;margin-bottom:2px}
.sb-version{font-size:10px;color:var(--text3);white-space:nowrap}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.top-bar{height:56px;min-height:56px;background:var(--header-grad);border-bottom:none;display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0}
.tb-title{font-size:15px;font-weight:600;color:#fff;flex:1}
.tb-right{display:flex;align-items:center;gap:12px;flex-shrink:0}
.clock{font-size:12px;color:rgba(255,255,255,.7);font-variant-numeric:tabular-nums;white-space:nowrap}
.preview-pill{font-size:10px;font-weight:700;letter-spacing:.5px;color:#fff;background:rgba(255,255,255,.16);padding:4px 10px;border-radius:20px}
.top-bar .btn-outline{color:rgba(255,255,255,.85);border-color:rgba(255,255,255,.4)}
.top-bar .btn-outline:hover{color:#fff;border-color:#fff}

.content{flex:1;overflow-y:auto;padding:24px}

/* ── KPI ROW ── */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.kpi-card{background:var(--header-grad);border:none;border-radius:14px;padding:16px 18px;box-shadow:0 3px 12px rgba(16,41,67,.18)}
.kpi-label{font-size:11px;color:rgba(255,255,255,.65);font-weight:500;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.kpi-value{font-size:28px;font-weight:700;color:#fff;line-height:1;margin-bottom:8px}
.kpi-sub{font-size:11px;color:rgba(255,255,255,.65);margin-top:5px}
.kpi-card .kpi-prog-track{background:rgba(255,255,255,.18)}

/* ── SECTION HEADER ── */
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-title{font-size:14px;font-weight:600;color:var(--text2)}

/* ── HOTEL GRID ── */
.hotel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.hotel-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;display:flex;flex-direction:column;gap:12px;transition:border-color .15s,transform .15s;box-shadow:var(--shadow)}
.hotel-card:hover{border-color:var(--text3);transform:translateY(-1px)}
.hc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.hc-name{font-size:15px;font-weight:700;color:var(--text)}
.hc-loc{font-size:11px;color:var(--text2);margin-top:2px}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap}
.badge-active{background:var(--teal-l);color:var(--teal)}
.hc-occ-row{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--text2)}
.kpi-prog-track{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.kpi-prog-fill{height:100%;background:var(--teal);border-radius:3px;transition:width .4s ease}
.hc-plans{display:flex;gap:6px;flex-wrap:wrap}
.plan-pill{font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px}
.plan-pill.base{background:rgba(139,143,168,.15);color:var(--text2)}
.plan-pill.premium{background:var(--warn-l);color:var(--warn)}
.plan-pill.max_comfort{background:var(--purple-l);color:var(--purple)}
.hc-footer{display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--text2);padding-top:8px;border-top:1px solid var(--border)}

/* ── PLACEHOLDER NOTE ── */
.preview-note{background:var(--purple-l);border:1px solid rgba(83,74,183,.25);border-radius:10px;padding:12px 16px;font-size:12px;color:var(--purple);margin-bottom:20px;line-height:1.5}

/* ── TOAST ── */
#toast-container{position:fixed;bottom:24px;right:24px;z-index:500;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-size:13px;color:var(--text);animation:toastIn .3s ease;pointer-events:all;box-shadow:0 8px 24px rgba(16,24,40,.12);max-width:320px}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}

/* ── HOTEL CARD LINK ── */
.hotel-card{cursor:pointer}

/* ── LOGIN ── */
.form-input{padding:9px 12px;border-radius:7px;border:1px solid var(--border);background:#fff;color:var(--text);font-size:13px;font-family:var(--font);outline:none;transition:border-color .15s;width:100%}
.form-input:focus{border-color:var(--purple)}
.form-input::placeholder{color:var(--text3)}
.form-error{font-size:12px;color:var(--alert);min-height:16px}
.login-overlay{position:fixed;inset:0;background:var(--bg);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{width:100%;max-width:340px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px 24px;display:flex;flex-direction:column;gap:14px;box-shadow:var(--shadow)}
.login-desc{font-size:12px;color:var(--text2);line-height:1.5}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:7px 14px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;border:1.5px solid transparent;font-family:var(--font);white-space:nowrap}
.btn-primary{background:var(--purple);color:#fff;border-color:var(--purple)}
.btn-primary:hover{background:#463e9c;border-color:#463e9c}
.btn-outline{background:transparent;color:var(--text2);border-color:var(--border)}
.btn-outline:hover{color:var(--text);border-color:var(--text3)}

@media(max-width:900px){
  .sidebar{width:60px;min-width:60px}
  .sidebar .sb-hotel,.sidebar .nav-label,.sidebar .sb-footer>*:not(.sb-status){display:none}
  .sidebar .sb-logo{justify-content:center}
  .sidebar .nav-item{padding:12px;justify-content:center}
  .sidebar .sb-status span{display:none}
  .sidebar .sb-status{justify-content:center}
  .kpi-row{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:600px){
  .kpi-row{grid-template-columns:1fr 1fr}
  .tb-right .clock{display:none}
  .hotel-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-overlay" id="login-screen">
  <div class="login-card">
    <div class="sb-logo"><div class="sb-logo-dot"></div><span style="font-size:15px">Nexo IoT</span></div>
    <p class="login-desc">Ingresa la clave de acceso de Nexo IoT para ver el panel general de hoteles.</p>
    <input class="form-input" type="password" id="login-key" placeholder="Clave de acceso" autocomplete="current-password">
    <button class="btn btn-primary" style="width:100%;padding:11px" id="login-btn">Ingresar</button>
    <div class="form-error" id="login-error"></div>
  </div>
</div>

<!-- SIDEBAR -->
<aside class="sidebar hidden" id="sidebar">
  <div class="sb-header">
    <div class="sb-logo">
      <div class="sb-logo-dot"></div>
      <span>Nexo IoT</span>
    </div>
    <div class="sb-hotel">Panel General</div>
  </div>
  <nav class="sb-nav">
    <div class="nav-item active">
      <span class="nav-icon">🏨</span>
      <span class="nav-label">Hoteles</span>
    </div>
    <div class="nav-item">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label">Configuración</span>
    </div>
  </nav>
  <div class="sb-footer">
    <div class="sb-status"><div class="sb-status-dot"></div><span>Sistema activo</span></div>
    <div class="sb-status-line">Conectado</div>
    <div class="sb-version">Nexo IoT v1.0</div>
  </div>
</aside>

<!-- MAIN -->
<main class="main hidden" id="main">
  <header class="top-bar">
    <div class="tb-title">Hoteles</div>
    <div class="tb-right">
      <div class="clock" id="clock"></div>
      <button class="btn btn-outline" id="logout-btn">Salir</button>
    </div>
  </header>

  <div class="content">
    <div class="kpi-row" id="kpi-row"></div>

    <div class="sec-header">
      <span class="sec-title">Hoteles — vista general</span>
    </div>
    <div class="hotel-grid" id="hotel-grid"></div>
  </div>
</main>

<div id="toast-container"></div>

<script src="./nexo-admin.js"></script>
</body>
</html>
